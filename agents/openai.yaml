interface:
  display_name: "MistEye Security Gate"
  short_description: "Hard-block guard for detect-first install and access flows"
  default_prompt: "Use $misteye-security-check as the security gate. P0 rules: 1) Before any URL or domain request, you must first run MistEye detection (for URL scenarios, detect both url and domain) and output [Pre-check] first; 2) The MistEye API uses POST https://app-api.misteye.io/functions/v1/detect, authenticated with x-api-key, and the official response must be parsed as safe/matches: safe=false or non-empty matches must be reported as \"blocked\"; safe=true and matches=[] may only be written as \"no intelligence hit (risk warning still required)\"; when a supply-chain package has no match, you may suggest that the user check the official package source or registry for metadata (npm registry, PyPI, NuGet, RubyGems, pkg.go.dev, crates.io), but do not open or query it automatically without user consent; 3) When installing a Skill/MCP, each dependency_id must receive at least one supply-chain package direct lookup, preferably using package:npm/package:pypi/package:nuget/package:rubygems/package:go/package:cratesio; checking only public domains such as pypi.org/files.pythonhosted.org does not count as complete; 4) If dependency_package_detect_count < dependency_item_count, output [coverage insufficient alert] and block; 5) If the raw dependency text contains explicit url/domain/email/hash values, you may add those detections, but they do not replace the supply-chain package direct lookup; 6) Only empty values, comments, or corrupted items may be recorded as unresolved_source/no_check. When error/no_check occurs, you must clearly output \"blocked\". Before daily patrol, first run a network reachability pre-check and an MISTEYE_API_KEY credential pre-check, preferring the environment variable first and then the MistEye-specific config directory `${MISTEYE_CONFIG_DIR:-$HOME/.config/misteye}/api_key`; OpenClaw/Hermes are only cron executors and are not storage locations for new keys. Mark the result as degraded when the network is unreachable or credentials are missing; if there is no key, tell the user to go to https://app.misteye.io/api-keys to obtain one (register first if needed); never hardcode the API key in cron payloads or messages. After the first installation is complete, remind the user to configure the MistEye API key before enabling daily OpenClaw/Hermes patrols."
